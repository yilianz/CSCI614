<head>

</head>

<body>
  <main>
    Amplify Testing Website
<h3>Test Lambda Integration</h3>
      <p>This is a simple test to verify Lambda function integration.</p>
      <button id="invoke-btn">Invoke Lambda</button>
      <pre id="lambda-result" style="background:#f4f4f4;padding:10px;margin-top:10px;"></pre>
  </main>

  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"
    integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
  <script src="js/main.js"></script>

  <!-- Chat Bubble Widget -->
  <style>
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #0078d4;
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: background 0.2s;
    }
    #chat-bubble:hover { background: #005a9e; }

    #chat-window {
      position: fixed;
      bottom: 96px;
      right: 28px;
      width: 360px;
      max-width: calc(100vw - 40px);
      height: 480px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      display: none;
      flex-direction: column;
      z-index: 9998;
      overflow: hidden;
      font-family: sans-serif;
    }
    #chat-window.open { display: flex; }

    #chat-header {
      background: #0078d4;
      color: #fff;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #chat-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f7f9fc;
    }

    .chat-msg {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #0078d4;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.bot {
      align-self: flex-start;
      background: #e8edf3;
      color: #222;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.error {
      align-self: flex-start;
      background: #fde8e8;
      color: #b00;
      border-bottom-left-radius: 4px;
    }
    .chat-typing {
      align-self: flex-start;
      font-size: 13px;
      color: #888;
      padding: 6px 12px;
    }

    #chat-input-area {
      display: flex;
      border-top: 1px solid #dde3ea;
      padding: 10px 10px;
      gap: 8px;
      background: #fff;
    }
    #chat-input {
      flex: 1;
      border: 1px solid #ccd3db;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 90px;
      min-height: 36px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    #chat-input:focus { border-color: #0078d4; }
    #chat-send {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #chat-send:hover { background: #005a9e; }
    #chat-send:disabled { background: #a0bcd8; cursor: default; }
  </style>

  <button id="chat-bubble" title="Chat with AI">&#128172;</button>

  <div id="chat-window" role="dialog" aria-label="AI Chat">
    <div id="chat-header">
      <span>AI Assistant</span>
      <button id="chat-close" aria-label="Close chat">&times;</button>
    </div>
    <div id="chat-messages" aria-live="polite"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Type a message---" aria-label="Message input"></textarea>
      <button id="chat-send" aria-label="Send message">&#10148;</button>
    </div>
  </div>

  <script>
    const LAMBDA_API_URL = 'https://oph58xvape.execute-api.us-east-2.amazonaws.com/testing/chat';
    const CHAT_API_URL = 'https://s15fvurafe.execute-api.us-east-2.amazonaws.com/default/AIconnect';
    //const keyword = "USCAID111223a";
   // var filename = keyword + ".txt";
    //console.log("Filename:", filename);

    // ── original Lambda test button ──────────────────────────────────────────
    async function invokeLambda(payload) {
      try {
        const response = await fetch(LAMBDA_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error(`HTTP error: ${response.status} ${response.statusText}`);
        }
        const data = await response.json();
        console.log('Lambda response:', data);
        document.getElementById('lambda-result').textContent = JSON.stringify(data, null, 2);
        return data;
      } catch (error) {
        console.error('Error invoking Lambda:', error);
        document.getElementById('lambda-result').textContent = 'Error: ' + error.message;
        throw error;
      }
    }

    document.getElementById('invoke-btn').addEventListener('click', () => {
      invokeLambda({ message: 'Who are you?' });
    });

    // ── Chat Bubble ──────────────────────────────────────────────────────────
    const chatBubble  = document.getElementById('chat-bubble');
    const chatWindow  = document.getElementById('chat-window');
    const chatClose   = document.getElementById('chat-close');
    const chatInput   = document.getElementById('chat-input');
    const chatSend    = document.getElementById('chat-send');
    const chatMessages = document.getElementById('chat-messages');

    chatBubble.addEventListener('click', () => {
      chatWindow.classList.toggle('open');
      if (chatWindow.classList.contains('open')) chatInput.focus();
    });

    chatClose.addEventListener('click', () => chatWindow.classList.remove('open'));

    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      chatInput.style.height = 'auto';
      chatSend.disabled = true;

      appendMessage(text, 'user');

      const typing = document.createElement('div');
      typing.className = 'chat-typing';
      typing.textContent = 'AI is thinking ...';
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const response = await fetch(`${CHAT_API_URL}?message=${encodeURIComponent(text)}`, {
          method: 'GET'
        });

        typing.remove();

        if (!response.ok) {
          throw new Error(`Server error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const reply = data.reply || data.message || data.response || data.answer
          || (typeof data === 'string' ? data : JSON.stringify(data, null, 2));
        appendMessage(reply, 'bot');
      } catch (err) {
        typing.remove();
        appendMessage('Error: ' + err.message, 'error');
        console.error('Chat error:', err);
      } finally {
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    chatSend.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // auto-grow textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 90) + 'px';
    });
  </script>





</body>
