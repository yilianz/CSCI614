name: Scan For OpenAI Key Leaks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  scan-openai-keys:
    name: Scan repository for OpenAI API keys
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan tracked files for possible leaked OpenAI keys
        shell: bash
        run: |
          set -euo pipefail

          matches="$(git grep -nI -E 'USCAID[A-Za-z0-9_-]{20,}' \
            -- . ':(exclude).github/workflows/scansecret.yml' || true)"

          if [ -n "$matches" ]; then
            echo "Possible API key leak detected in tracked files:"
            echo "$matches"
            exit 1
          fi

          echo "No possible API key leaks found."
