name: Scan For OpenAI Key Leaks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  scan-openai-keys:
    name: Scan repository for OpenAI API keys
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan tracked files for possible leaked OpenAI keys
        shell: bash
        run: |
          set -euo pipefail

          key_pattern='sk-(proj-)?[A-Za-z0-9_-]{20,}'
          assignment_pattern='(OPENAI(_API)?_KEY|api[_-]?key)[[:space:]]*[:=][[:space:]]*["'"'']?sk-(proj-)?[A-Za-z0-9_-]{20,}'

          matches="$(git grep -nI -E "${assignment_pattern}|${key_pattern}" -- . ':(exclude).github/workflows/scansecret.yml' || true)"

          if [ -n "$matches" ]; then
            echo "Possible OpenAI API key leak detected in tracked files:"
            echo "$matches"
            exit 1
          fi

          echo "No possible OpenAI API key leaks found."
